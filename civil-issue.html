<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg,#0f5a9e 0%,#8d015d 100%); color:#fff; min-height:100vh; padding-bottom:40px; }
.login-page { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#0f5a9e 0%,#8d015d 100%); align-items:center; justify-content:center; z-index:2000; }

.login-box { background:rgba(13,50,100,0.9); padding:40px; border-radius:15px; border:2px solid #a0327d; box-shadow:0 8px 32px rgba(0,0,0,0.3); width:100%; max-width:400px; }
.login-box h1 { font-size:26px; margin-bottom:24px; text-align:center; }
.login-form { display:flex; flex-direction:column; gap:15px; }
.login-form input { padding:12px; border:2px solid #a0327d; border-radius:6px; background:rgba(13,50,100,0.8); color:#fff; font-size:14px; }
.login-form button { padding:12px; background:#a0327d; color:#fff; border:2px solid #a0327d; border-radius:6px; font-weight:600; cursor:pointer; }
.login-message { padding:10px; border-radius:6px; text-align:center; font-weight:600; margin-bottom:10px; display:none; }
.login-message.success { background:#27ae60; display:block; } .login-message.error { background:#e74c3c; display:block; }
.back { display:block; text-align:left; margin-bottom:18px; color:#e6c8e6; text-decoration:none; font-size:13px; font-weight:600; }
.container { max-width:1400px; margin:0 auto; padding:20px; display:none; }
.container.show { display:block; }
header { background:#0d4a85; padding:20px; border-radius:0 0 15px 15px; margin-bottom:25px; border-bottom:3px solid #a0327d; }
.header-top { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.header-title h1 { font-size:26px; } .header-title p { font-size:13px; color:#ccc; }
.header-controls { display:flex; gap:10px; align-items:center; }
button { background:#0d4a85; color:#fff; border:2px solid #a0327d; padding:10px 16px; border-radius:6px; cursor:pointer; font-weight:600; font-size:14px; transition:all .2s; }
button:hover { background:#a0327d; }
.tabs { display:flex; gap:10px; margin-bottom:25px; flex-wrap:wrap; }
.tab-btn { padding:12px 18px; background:#0d4a85; border:2px solid #a0327d; cursor:pointer; font-weight:600; color:#fff; border-radius:8px; }
.tab-btn.active { background:#a0327d; }
.tab-content { display:none; } .tab-content.active { display:block; }
.form-section { background:rgba(13,50,100,0.6); padding:25px; border-radius:10px; margin-bottom:25px; border:2px solid #a0327d; }
.form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; margin-bottom:18px; }
.form-group { display:flex; flex-direction:column; }
label { font-weight:600; margin-bottom:7px; font-size:14px; }
input[type=text],input[type=date],select,textarea { padding:11px; border:2px solid #a0327d; border-radius:6px; background:rgba(13,50,100,0.8); color:#fff; font-size:14px; }
.image-upload { background:rgba(13,50,100,0.5); border:2px dashed #a0327d; border-radius:8px; padding:18px; text-align:center; color:#ccc; cursor:text; }
h2 { margin-bottom:18px; font-size:20px; } h3 { margin:18px 0 12px; font-size:16px; color:#ccc; }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin:15px 0; }
.stat-box { background:rgba(13,50,100,0.8); padding:15px; border-radius:8px; text-align:center; border:2px solid #a0327d; }
.stat-value { font-size:26px; font-weight:bold; color:#a0327d; } .stat-label { font-size:12px; color:#ccc; margin-top:5px; }

th,td { padding:10px; border-bottom:1px solid #2a5a92; text-align:left; font-size:13px; vertical-align:top; }
th { color:#cdd8e6; font-size:12px; text-transform:uppercase; letter-spacing:.4px; }

.modal-box { background:#0d3a6e; border:2px solid #a0327d; border-radius:12px; max-width:820px; width:92%; max-height:88vh; overflow:auto; padding:24px; }
.close-x { float:right; cursor:pointer; font-size:30px; line-height:1; }

<body>
<div class="login-page show" id="loginPage">
  <div class="login-box">
    <a class="back" href="cleaning.html">тЖР Back to categories</a>
    <h1>ЁЯз▒ Civil Issues</h1>
    <div class="login-message" id="loginMessage"></div>
    <form class="login-form" onsubmit="handleLogin(event)">
      <input type="text" id="loginUsername" placeholder="Username" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</div>

<div class="container" id="mainContainer">
  <header><div class="header-top">
    <div class="header-title"><h1>ЁЯз▒ Civil Issues</h1><p>Building issues reported by cleaning supervisors</p></div>
    <div class="header-controls">
      <button onclick="location.href='cleaning.html'">ЁЯПа Categories</button>
      <button onclick="logout()" style="background:#C5504F;border-color:#C5504F;">ЁЯЪк Logout</button>
    </div>
  </div></header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event,'list')">ЁЯУЛ Issues</button>
    <button class="tab-btn" onclick="switchTab(event,'add')">тЮХ Add Issue</button>
    <button class="tab-btn" onclick="switchTab(event,'analytics')">ЁЯУИ Analytics</button>
  </div>

  <div id="add" class="tab-content">
    <div class="form-section"><h2>тЮХ Report a New Issue</h2>
      <div class="form-row">
        <div class="form-group"><label>Project</label><select id="ci-project" onchange="updateCIBuildings()"></select></div>
        <div class="form-group"><label>Building</label><select id="ci-building" onchange="updateCIFloors()"></select></div>
        <div class="form-group"><label>Floor</label><select id="ci-floor"></select></div>
        <div class="form-group"><label>Spot</label><select id="ci-spot"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Issue Type</label><select id="ci-issuetype" onchange="toggleOther()"></select></div>
        <div class="form-group" id="ci-otherwrap" style="display:none;"><label>Describe (Other)</label><input type="text" id="ci-other" placeholder="Type the issue"></div>
        <div class="form-group"><label>Date</label><input type="date" id="ci-date"></div>
      </div>
      <div class="form-group" style="margin-bottom:18px;"><label>Note (optional)</label><input type="text" id="ci-note" placeholder="Any extra detail"></div>
      <h3>ЁЯУ╕ Photo of the problem (paste)</h3>
      <div class="image-upload" id="ci-imageArea" onpaste="handlePaste(event,'ci')">Click here and paste (Ctrl+V)</div>
      <img id="ci-image" style="display:none;max-width:220px;margin-top:12px;border-radius:8px;border:2px solid #a0327d;">
      <div style="margin-top:18px;"><button onclick="saveIssue()">ЁЯТ╛ Save Issue</button> <button onclick="clearIssueForm()" style="background:#0d4a85;">ЁЯЧСя╕П Clear</button></div>
    </div>
  </div>

  <div id="list" class="tab-content active">
    <div class="form-section"><h2>ЁЯУЛ Reported Issues</h2>
      <div class="form-row">
        <div class="form-group"><label>Project</label><select id="f-project" onchange="renderIssues()"><option value="">All</option></select></div>
        <div class="form-group"><label>Status</label><select id="f-status" onchange="renderIssues()"><option value="">All</option><option value="open">Open</option><option value="fixed">Fixed</option></select></div>
        <div class="form-group"><label>Search building/floor/spot</label><input type="text" id="f-search" oninput="renderIssues()" placeholder="e.g. RA-A12 or stairs"></div>
        <div class="form-group" style="justify-content:flex-end;"><button onclick="loadIssues()">ЁЯФД Refresh</button></div>
      </div>
      <div id="issuesTable"><p>LoadingтАж</p></div>
    </div>
  </div>

  <div id="analytics" class="tab-content">
    <div class="form-section"><h2>ЁЯУИ Analytics</h2><div id="analyticsContent"><p>LoadingтАж</p></div></div>
  </div>

  <footer>Prepared by <strong>Swar Dizayee</strong></footer>
</div>

<div class="modal" id="issueModal" onclick="if(event.target===this)closeIssueModal()"><div class="modal-box" id="issueBox"></div></div>
<div class="modal" id="imgModal" onclick="closeImg()"><img id="imgBig" style="max-width:92%;max-height:92%;border-radius:10px;"></div>

let allIssues = [];
let currentIssueImage = '';
let uploadingIssue = false;

function handleLogin(e){ e.preventDefault(); const u=document.getElementById('loginUsername').value; const p=document.getElementById('loginPassword').value; fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'verifyLogin',username:u,password:p})}).then(r=>r.json()).then(d=>{const m=document.getElementById('loginMessage'); if(d.success){m.className='login-message success';m.textContent='тЬЕ '+d.message; localStorage.setItem('civ_isLoggedIn','true'); localStorage.setItem('civ_user',u); localStorage.setItem('civ_token',d.token||''); setTimeout(()=>location.reload(),800);} else {m.className='login-message error';m.textContent='тЭМ '+d.message;}}).catch(e=>alert('Error: '+e.message)); }
function logout(){ if(confirm('Log out?')){ localStorage.removeItem('civ_isLoggedIn'); localStorage.removeItem('civ_user'); localStorage.removeItem('civ_token'); location.reload(); } }

function uploadToImgbb(file,cb){ const r=new FileReader(); r.onload=e=>{ const b64=e.target.result.split(',')[1]; const fd=new FormData(); fd.append('image',b64); fd.append('key',IMGBB_API_KEY); fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd}).then(x=>x.json()).then(d=>{ cb(d.success&&d.data?d.data.url:null); }).catch(()=>cb(null)); }; r.readAsDataURL(file); }
function compressImage(file,cb){ const r=new FileReader(); r.onload=e=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas'); c.width=img.width*0.6; c.height=img.height*0.6; c.getContext('2d').drawImage(img,0,0,c.width,c.height); c.toBlob(b=>uploadToImgbb(b,cb),'image/jpeg',0.7); }; img.src=e.target.result; }; r.readAsDataURL(file); }
function handlePaste(e,which){ const items=e.clipboardData.items; for(let i=0;i<items.length;i++){ if(items[i].type.indexOf('image')!==-1){ const blob=items[i].getAsFile(); e.preventDefault(); const area=document.getElementById('ci-imageArea'); area.innerHTML='тП│ UploadingтАж'; uploadingIssue=true; compressImage(blob,url=>{ uploadingIssue=false; if(url){ currentIssueImage=url; const im=document.getElementById('ci-image'); im.src=url; im.style.display='block'; area.innerHTML='тЬЕ Photo uploaded'; } else { area.innerHTML='тЭМ Upload failed, try again'; } }); return; } } }

function populateSelect(id,arr,useKeys){ const el=document.getElementById(id); el.innerHTML=''; arr.forEach(v=>{ const o=document.createElement('option'); if(useKeys){ o.value=v; o.textContent=projectNames[v]; } else { o.value=v; o.textContent=v; } el.appendChild(o); }); }
function updateCIBuildings(){ const p=document.getElementById('ci-project').value; const bs=Object.keys(floors[p]||{}); const el=document.getElementById('ci-building'); el.innerHTML=''; bs.forEach(b=>{ const o=document.createElement('option'); o.value=b;o.textContent=b; el.appendChild(o); }); updateCIFloors(); }
function updateCIFloors(){ const p=document.getElementById('ci-project').value; const b=document.getElementById('ci-building').value; const fs=(floors[p]&&floors[p][b])?floors[p][b]:[]; const el=document.getElementById('ci-floor'); el.innerHTML=''; fs.forEach(f=>{ const o=document.createElement('option'); o.value=f;o.textContent=f; el.appendChild(o); }); }
function toggleOther(){ document.getElementById('ci-otherwrap').style.display = document.getElementById('ci-issuetype').value==='Other'?'flex':'none'; }
function clearIssueForm(){ currentIssueImage=''; document.getElementById('ci-image').style.display='none'; document.getElementById('ci-imageArea').innerHTML='Click here and paste (Ctrl+V)'; document.getElementById('ci-note').value=''; document.getElementById('ci-other').value=''; }

function saveIssue(){ if(uploadingIssue){ alert('Please wait for the photo to finish uploading.'); return; } let itype=document.getElementById('ci-issuetype').value; if(itype==='Other'){ const o=document.getElementById('ci-other').value.trim(); if(!o){ alert('Please describe the Other issue.'); return; } itype=o; } if(!currentIssueImage){ if(!confirm('No photo attached. Save anyway?')) return; } const rec={ action:'addCivilIssue', project:document.getElementById('ci-project').value, building:document.getElementById('ci-building').value, floor:document.getElementById('ci-floor').value, spot:document.getElementById('ci-spot').value, issueType:itype, note:document.getElementById('ci-note').value, date:document.getElementById('ci-date').value||new Date().toISOString().split('T')[0], photo:currentIssueImage, token:localStorage.getItem('civ_token')||'' }; fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify(rec)}).then(r=>r.json()).then(()=>{ alert('тЬЕ Issue saved!'); clearIssueForm(); loadIssues(); switchTabTo('list'); }).catch(e=>alert('тЭМ Error: '+e.message)); }

function loadIssues(){ const url=GOOGLE_SCRIPT_URL+'?token='+encodeURIComponent(localStorage.getItem('civ_token')||'')+'&what=civil'; fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'getCivilIssues',token:localStorage.getItem('civ_token')||''})}).then(r=>r.json()).then(d=>{ if(Array.isArray(d)){ allIssues=d; renderIssues(); renderAnalytics(); } else if(d&&d.error==='unauthorized'){ logout(); } }).catch(e=>{ document.getElementById('issuesTable').innerHTML='<p>Error loading: '+e.message+'</p>'; }); }
function locStr(r){ return (r.project? (r.project.toUpperCase()) : '')+' '+r.building+' ┬╖ '+r.floor+' ┬╖ '+r.spot; }
function renderIssues(){ const fp=document.getElementById('f-project').value; const fs=document.getElementById('f-status').value; const q=(document.getElementById('f-search').value||'').toLowerCase(); let rows=allIssues.filter(r=>{ if(fp&&r.project!==fp)return false; if(fs&&r.status!==fs)return false; if(q){ const hay=(r.building+' '+r.floor+' '+r.spot+' '+r.issueType).toLowerCase(); if(hay.indexOf(q)===-1)return false; } return true; }); rows.sort((a,b)=>(b.date||'').localeCompare(a.date||'')); let h='<p style="color:#ccc;margin-bottom:10px;">'+rows.length+' issue(s)</p><table><thead><tr><th>Issue</th><th>Location</th><th>Date</th><th>Status</th><th>Photo</th></tr></thead><tbody>'; if(rows.length===0) h+='<tr><td colspan="5">No issues match.</td></tr>'; rows.forEach(r=>{ h+='<tr class="issue-row" onclick="openIssue(\''+r.id+'\')"><td>'+r.issueType+(r.note?' <span style="color:#aaa;">('+r.note+')</span>':'')+'</td><td>'+locStr(r)+'</td><td>'+r.date+'</td><td><span class="badge '+(r.status==='fixed'?'fixed':'open')+'">'+(r.status==='fixed'?'Fixed':'Open')+'</span></td><td>'+(r.photo?'<img class="thumb" src="'+r.photo+'">':'тАФ')+'</td></tr>'; }); h+='</tbody></table>'; document.getElementById('issuesTable').innerHTML=h; }

function openIssue(id){ const r=allIssues.find(x=>x.id===id); if(!r)return; let h='<span class="close-x" onclick="closeIssueModal()">&times;</span>'; h+='<h2>'+r.issueType+'</h2><p style="color:#ccc;">'+locStr(r)+' ┬╖ '+r.date+' ┬╖ <span class="badge '+(r.status==='fixed'?'fixed':'open')+'">'+(r.status==='fixed'?'Fixed':'Open')+'</span></p>'; if(r.note)h+='<p style="margin-top:8px;"><strong>Note:</strong> '+r.note+'</p>'; if(r.createdBy)h+='<p style="color:#aaa;font-size:12px;">Reported by '+r.createdBy+'</p>'; h+='<div class="beforeafter"><div><p style="color:#ccc;margin-bottom:6px;">Problem</p>'+(r.photo?'<img src="'+r.photo+'" onclick="bigImg(this.src)">':'<p>No photo</p>')+'</div><div><p style="color:#ccc;margin-bottom:6px;">Fixed</p>'+(r.fixedPhoto?'<img src="'+r.fixedPhoto+'" onclick="bigImg(this.src)">':'<p style="color:#888;">Not fixed yet</p>')+'</div></div>'; if(r.status!=='fixed'){ h+='<h3>тЬЕ Mark as fixed</h3><div class="image-upload" id="fix-area" onpaste="pasteFix(event,\''+r.id+'\')">Click here and paste the photo of the completed fix (Ctrl+V)</div>'; } document.getElementById('issueBox').innerHTML=h; document.getElementById('issueModal').classList.add('show'); }
function closeIssueModal(){ document.getElementById('issueModal').classList.remove('show'); }
function pasteFix(e,id){ const items=e.clipboardData.items; for(let i=0;i<items.length;i++){ if(items[i].type.indexOf('image')!==-1){ const blob=items[i].getAsFile(); e.preventDefault(); const area=document.getElementById('fix-area'); area.innerHTML='тП│ UploadingтАж'; compressImage(blob,url=>{ if(url){ fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'markCivilFixed',id:id,fixedPhoto:url,token:localStorage.getItem('civ_token')||''})}).then(r=>r.json()).then(()=>{ const it=allIssues.find(x=>x.id===id); if(it){it.status='fixed';it.fixedPhoto=url;} renderIssues(); renderAnalytics(); openIssue(id); }).catch(er=>{ area.innerHTML='тЭМ '+er.message; }); } else { area.innerHTML='тЭМ Upload failed, try again'; } }); return; } } }

function bigImg(src){ document.getElementById('imgBig').src=src; document.getElementById('imgModal').classList.add('show'); }
function closeImg(){ document.getElementById('imgModal').classList.remove('show'); }

function renderAnalytics(){ const total=allIssues.length; const open=allIssues.filter(r=>r.status!=='fixed').length; const fixed=total-open; let h='<div class="stats"><div class="stat-box"><div class="stat-value">'+total+'</div><div class="stat-label">Total Issues</div></div><div class="stat-box"><div class="stat-value" style="color:#C5504F;">'+open+'</div><div class="stat-label">Open</div></div><div class="stat-box"><div class="stat-value" style="color:#27ae60;">'+fixed+'</div><div class="stat-label">Fixed</div></div></div>'; h+='<h3>By Project</h3><table><thead><tr><th>Project</th><th>Open</th><th>Fixed</th><th>Total</th></tr></thead><tbody>'; ['ec','es','wd','ww','ra'].forEach(p=>{ const pr=allIssues.filter(r=>r.project===p); if(pr.length===0)return; const o=pr.filter(r=>r.status!=='fixed').length; h+='<tr><td>'+projectNames[p]+'</td><td>'+o+'</td><td>'+(pr.length-o)+'</td><td>'+pr.length+'</td></tr>'; }); h+='</tbody></table>'; const types={}; allIssues.forEach(r=>{ types[r.issueType]=(types[r.issueType]||0)+1; }); h+='<h3>By Issue Type</h3><table><thead><tr><th>Type</th><th>Count</th></tr></thead><tbody>'; Object.keys(types).sort((a,b)=>types[b]-types[a]).forEach(t=>{ h+='<tr><td>'+t+'</td><td>'+types[t]+'</td></tr>'; }); h+='</tbody></table>'; document.getElementById('analyticsContent').innerHTML=h; }

function switchTab(e,t){ document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); e.target.classList.add('active'); }
function switchTabTo(t){ document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>{ if(b.getAttribute('onclick').indexOf("'"+t+"'")!==-1) b.classList.add('active'); }); }

window.addEventListener('load',()=>{ const u=localStorage.getItem('civ_user'); const li=localStorage.getItem('civ_isLoggedIn'); if(!li||!u){ document.getElementById('loginPage').classList.add('show'); return; } fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'verifyUser',username:u,token:localStorage.getItem('civ_token')||''})}).then(r=>r.json()).then(d=>{ if(!d.exists){ logout(); return; } document.getElementById('loginPage').classList.remove('show'); document.getElementById('mainContainer').classList.add('show'); populateSelect('ci-project',['ec','es','wd','ww','ra'],true); updateCIBuildings(); populateSelect('ci-spot',spots,false); populateSelect('ci-issuetype',issueTypes,false); const fp=document.getElementById('f-project'); ['ec','es','wd','ww','ra'].forEach(p=>{ const o=document.createElement('option'); o.value=p;o.textContent=projectNames[p]; fp.appendChild(o); }); document.getElementById('ci-date').value=new Date().toISOString().split('T')[0]; loadIssues(); }); });
</script>
</body>
</html>
