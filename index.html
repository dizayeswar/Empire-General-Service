<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://api.imgbb.com">
    <title>Empire World — Dashboards</title>
    <link rel="stylesheet" href="assets/empire-hub.css">
</head>
<body>
    <div class="topbar">
      <img src="logo-light.png" alt="Empire World" style="height:48px;width:auto;">
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark or light mode"><span class="nav-icon theme-icon"></span> <span class="lbl">Theme</span></button>
    </div>
    <div class="wrap wide">
        <header>
            <h1>Empire World</h1>
            <p>Choose a department to open its dashboard</p>
        </header>
        <div class="grid" id="grid"></div>
        <footer>Prepared by <strong>Swar Dizayee</strong></footer>
    </div>
    <script src="assets/empire-core.js"></script>
    <script>
        const categories = [
            { icon:'🧹', name:'Cleaning Department', desc:'Daily reports, task checklists & monthly report.', link:'cleaning.html', active:true },
            { icon:'🏗️', name:'Civil Department', desc:'Daily maintenance jobs & monthly reports.', link:'civil-department.html', active:true },
            { icon:'⛑️', name:'HSE Department', desc:'Fire safety inspections — equipment checks (okay, needs fix, missing).', link:'hse-department.html', active:true },
            { icon:'🛡️', name:'Security', desc:'Coming soon — tell us what this dashboard should track.', active:false },
            { icon:'🌿', name:'Landscaping', desc:'Coming soon — tell us what this dashboard should track.', active:false },
            { icon:'⚡', name:'Electrical Department', desc:'Daily maintenance jobs, call center shifts & monthly reports.', link:'electrical.html', active:true },
            { icon:'🚰', name:'Plumbing', desc:'Coming soon — tell us what this dashboard should track.', active:false },
            { icon:'📦', name:'Stores / Inventory', desc:'Coming soon — tell us what this dashboard should track.', active:false },
            { icon:'👥', name:'HR / Staff', desc:'Coming soon — tell us what this dashboard should track.', active:false }
        ];
        function render(){
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            categories.forEach(c => {
                let el;
                if (c.active && c.link) {
                    el = document.createElement('a');
                    el.href = c.link;
                    el.className = 'tile active';
                } else {
                    el = document.createElement('div');
                    el.className = 'tile soon';
                    el.addEventListener('click', () => alert(c.name + ' is coming soon.'));
                }
                el.innerHTML = '<div class="icon">' + c.icon + '</div>' +
                    '<h2>' + c.name + '</h2>' +
                    '<p>' + c.desc + '</p>' +
                    '<span class="badge ' + (c.active ? 'open' : 'wait') + '">' + (c.active ? 'Open' : 'Coming Soon') + '</span>';
                grid.appendChild(el);
            });
        }
        render();
    </script>
</body>
</html>
