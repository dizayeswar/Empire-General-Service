<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo-light.png" type="image/png">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://api.imgbb.com">
    <title>Cleaning Department — Empire World</title>
    <link rel="stylesheet" href="assets/empire-hub.css">
</head>
<body>
    <div class="topbar">
      <img src="logo-light.png" alt="Empire World" style="height:48px;width:auto;">
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark or light mode"><span class="nav-icon theme-icon"></span> <span class="lbl">Theme</span></button>
    </div>
    <div class="wrap">
        <a class="back" href="index.html">&larr; Back to Empire World</a>
        <header>
            <h1>Cleaning Department</h1>
            <p>Choose a section to open</p>
        </header>
        <div class="grid" id="grid"></div>
        <footer>Prepared by <strong>Swar Dizayee</strong></footer>
    </div>
    <script src="assets/empire-core.js"></script>
    <script>
        const sections = [
            { icon:'🧹', name:'Cleaning', desc:'Daily reports, task checklists & monthly report.', link:'cleaning-dashboard.html', active:true },
            { icon:'🧱', name:'Civil Issue', desc:'Building issues found during cleaning rounds — log photos & track repairs.', link:'civil-issue.html', active:true },
            { icon:'⚡', name:'Electric Issue', desc:'Electrical problems found in buildings — log photos & track repairs.', link:'electric-issue.html', active:true },
            { icon:'🧯', name:'Fire Fighting & Mechanical', desc:'Fire safety systems & mechanical equipment — inspections and maintenance.', link:'fire-issue.html', active:true }
        ];
        function render(){
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            sections.forEach(c => {
                let el;
                if (c.active && c.link) {
                    el = document.createElement('a');
                    el.href = c.link;
                    el.className = 'tile active';
                } else {
                    el = document.createElement('div');
                    el.className = 'tile soon';
                    el.addEventListener('click', () => alert(c.name + ' is coming soon.'));
                }
                el.innerHTML = '<div class="icon">' + c.icon + '</div>' +
                    '<h2>' + c.name + '</h2>' +
                    '<p>' + c.desc + '</p>' +
                    '<span class="badge ' + (c.active ? 'open' : 'wait') + '">' + (c.active ? 'Open' : 'Coming Soon') + '</span>';
                grid.appendChild(el);
            });
        }
        render();
    </script>
</body>
</html>
